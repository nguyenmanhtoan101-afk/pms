# Nginx reverse proxy cho PMS Lào Cai — domain pms.foxai.com.vn
# Đặt file này tại: /etc/nginx/sites-available/pms.foxai.com.vn
# Kích hoạt:        sudo ln -s /etc/nginx/sites-available/pms.foxai.com.vn /etc/nginx/sites-enabled/
#
# Đây là cấu hình HTTP (cổng 80) ban đầu. Sau khi chạy:
#     sudo certbot --nginx -d pms.foxai.com.vn
# Certbot sẽ TỰ chèn khối SSL (cổng 443) + chuyển hướng 80 -> 443 vào file này.

server {
    listen 80;
    listen [::]:80;
    server_name pms.foxai.com.vn;

    # Cho phép upload văn bản tới 10MB (khớp giới hạn Multer của backend)
    client_max_body_size 12m;

    # Log riêng cho dễ theo dõi
    access_log /var/log/nginx/pms.access.log;
    error_log  /var/log/nginx/pms.error.log;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Hỗ trợ kết nối keep-alive / nâng cấp (phòng khi dùng SSE/WebSocket sau này)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 30s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }
}
