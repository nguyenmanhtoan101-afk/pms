services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pms
      POSTGRES_PASSWORD: ${PGPASSWORD:-pms2026}
      POSTGRES_DB: pms_laocai
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pms -d pms_laocai"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Không expose PostgreSQL ra ngoài — chỉ các container trong mạng nội bộ truy cập.
    # Khi cần debug từ host, mở tạm: ports: ["127.0.0.1:5432:5432"]

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: pms
      PGPASSWORD: ${PGPASSWORD:-pms2026}
      PGDATABASE: pms_laocai
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      PORT: 3000
      SEED_DEMO: ${SEED_DEMO:-1}
    depends_on:
      postgres:
        condition: service_healthy
    # Chỉ bind vào localhost — Nginx (host) reverse proxy + TLS đứng trước cổng này.
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    volumes:
      - uploads:/app/uploads
    command: sh -c "node src/db/seed.js && node src/index.js"

volumes:
  pgdata:
  uploads:
